name: Scan quotidien (journal prospectif)

on:
  schedule:
    # Cible : 09h45 New York (13h45 UTC été / 14h45 UTC hiver). Les crons
    # GitHub sont souvent exécutés en retard (2-3 h constatées) : les tirs
    # supplémentaires servent de filet de sécurité — la garde anti-doublon
    # de daily_scan.py garantit UN SEUL scan journalisé par jour (le premier).
    - cron: "45 13 * * 1-5"
    - cron: "45 14 * * 1-5"
    - cron: "45 15 * * 1-5"
    - cron: "45 17 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Dépendances
        run: pip install -r requirements.txt

      - name: Scan quotidien (protocole gelé)
        run: python -m scanner.daily_scan

      - name: Site statique (GitHub Pages)
        run: python tools/build_docs.py

      - name: Commit des résultats
        run: |
          git config user.name "optiscan-bot"
          git config user.email "actions@users.noreply.github.com"
          git add output docs
          git diff --cached --quiet && echo "Rien à committer" || {
            git commit -m "scan quotidien $(date -u +%F)"
            git push
          }
